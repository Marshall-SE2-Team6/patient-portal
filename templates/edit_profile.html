{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 520px;">
  <h2>Edit Profile</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <a href="{% url 'password_change' %}" class="btn btn-primary w-100 mb-2">
      Change Password
    </a>
    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100 mb-2">
      Reset Password
    </a>
    <button class="btn btn-primary w-100" type="submit">Save</button>
  </form>

  <div class="mt-3 text-center">
    <a href="/profile/">Back to profile</a>
  </div>
</div>
{% endblock %}
