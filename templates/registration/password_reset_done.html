{% extends "base.html" %}
{% block title %}Reset Email Sent{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 520px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4 mb-2">Check your email</h1>
      <p class="text-muted mb-3">
        If an account exists for that email, a password reset link was sent.
      </p>
      <a class="btn btn-primary w-100" href="{% url 'login' %}">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
