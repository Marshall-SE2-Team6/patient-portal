{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 520px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="h4 mb-2">Password reset complete</h1>
            <p class="text-muted mb-3">You can now log in with your new password.</p>
            <a class="btn btn-primary w-100" href="{% url 'login' %}">Go to Login</a>
        </div>
    </div>
</div>
{% endblock %}
