{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card">
        <div class="card-body">
          <h1 class="h4 mb-3">Login</h1>

          <form method="post" novalidate>
            {% csrf_token %}

            {# preserves redirect behavior (?next=/dashboard/) #}
            {% if next %}
              <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div class="mb-3">
              <label class="form-label" for="id_username">Username</label>
              <input class="form-control" type="text" name="username" id="id_username" autofocus required>
            </div>

            <div class="mb-3">
              <label class="form-label" for="id_password">Password</label>
              <input class="form-control" type="password" name="password" id="id_password" required>
            </div>

            {% if form.errors %}
              <div class="alert alert-danger mb-3">
                Invalid username or password.
              </div>
            {% endif %}

            <button class="btn btn-primary w-100" type="submit">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
