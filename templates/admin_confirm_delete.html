{% extends "base.html" %}
{% block title %}Confirm Delete{% endblock %}

{% block body %}
<div class="portal-app-shell">
    <div class="portal-main" style="margin: auto; max-width: 600px;">
        <div class="portal-topbar">
            <h1 class="portal-topbar-title">Confirm Deletion</h1>
        </div>

        <main class="portal-content">
            <section class="portal-panel">
                <p>
                    Are you sure you want to delete invoice
                    <strong>{{ invoice.invoice_number }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button type="submit" class="portal-outline-btn" style="border-color: red; color: red;">
                            Yes, Delete
                        </button>

                        <a href="{% url 'admin_billing' %}" class="portal-outline-btn">
                            Cancel
                        </a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
{% endblock %}
